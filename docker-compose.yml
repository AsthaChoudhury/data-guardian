version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - dataguardian-net
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # kafka:
  #   image: confluentinc/cp-kafka:7.4.0
  #   depends_on:
  #     zookeeper:
  #       condition: service_healthy
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
  #     KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
  #     KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #     KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
  #   ports:
  #     - "9092:9092"
  #   healthcheck:
  #     test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      # KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - dataguardian-net


    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - dataguardian-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  # Data Generation (Python)
  data-generator:
    build:
      context: ./analytics
      dockerfile: Dockerfile.generator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
    networks:
      - dataguardian-net
    profiles:
      - generator

  # Streaming Engine (PySpark)
  streaming-engine:
    build:
      context: ./analytics
      dockerfile: Dockerfile.streaming
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_RAW_TOPIC: patient_data
      KAFKA_ISSUES_TOPIC: dq_issues
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SPARK_MASTER: local[2]
      SPARK_APP_NAME: DataGuardian
      SPARK_CHECKPOINT_DIR: /tmp/dg_checkpoint
      DATA_LAKE_PATH: /tmp/data_lake
    networks:
      - dataguardian-net
    profiles:
      - streaming

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      SERVER_PORT: 8080
    networks:
      - dataguardian-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - api

volumes:
  redis_data:

networks:
  dataguardian-net:
    driver: bridge